version: '3.9'

services:
  backend:
    build: ./backend
    container_name: portfolio_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - portfolio-network

  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    restart: unless-stopped
    networks:
      - portfolio-network


networks:
  portfolio-network:
    driver : bridge